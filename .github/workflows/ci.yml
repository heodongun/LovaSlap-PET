name: CI

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run self-check
        run: swift run MiyeonSlap --self-check

      - name: Build app bundle
        run: zsh scripts/build_app_bundle.sh
